<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOVE FLOW AESTHETIC</title>

<style>
body{
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  overflow:hidden;
}

/* 🌸 BACKGROUND CYBER GIRL */
body::before{
  content:"";
  position:fixed;
  width:200%;
  height:200%;
  background:
    radial-gradient(circle at 20% 20%, #ff4fd8 0%, transparent 30%),
    radial-gradient(circle at 80% 30%, #7c4dff 0%, transparent 35%),
    radial-gradient(circle at 50% 80%, #ffb3e6 0%, transparent 40%);
  filter: blur(60px);
  animation: moveBg 8s infinite alternate ease-in-out;
  z-index:-2;
}

@keyframes moveBg{
  from{transform:translate(-10%, -10%) scale(1);}
  to{transform:translate(10%, 10%) scale(1.1);}
}

/* overlay gelap biar tulisan kebaca */
.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.35);
  z-index:-1;
}

/* PAGE */
.page{
  position:absolute;
  width:100%;
  height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.active{
  display:flex;
}

/* 💖 TEXT FINAL */
.finalText{
  font-size:55px;
  color:white;
  text-shadow:0 0 15px #ff4fd8, 0 0 40px #ff4fd8;
  animation:pulse 1s infinite alternate;
  text-align:center;
}

@keyframes pulse{
  from{transform:scale(1);}
  to{transform:scale(1.08);}
}

/* ✨ BUTTON GLASS */
.btn{
  position:absolute;
  padding:14px 28px;
  border-radius:20px;
  border:1px solid rgba(255,255,255,0.4);
  background:rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);
  color:white;
  font-size:18px;
  cursor:pointer;
  box-shadow:0 0 20px rgba(255,79,216,0.5);
  transition:0.25s;
}

.btn:hover{
  transform:scale(1.1);
  background:rgba(255,79,216,0.3);
  box-shadow:0 0 30px #ff4fd8;
}

/* POSISI BUTTON */
.center{ top:50%; left:50%; transform:translate(-50%,-50%); }
.top-right{ top:18%; right:10%; }
.top-left{ top:18%; left:10%; }
.bottom{ bottom:14%; left:50%; transform:translateX(-50%); }
.big-center{
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  font-size:22px;
  padding:18px 45px;
}

/* 💖 HEART */
.heart{
  position:absolute;
  color:#ff4fd8;
  font-size:18px;
  animation:fall linear infinite;
  text-shadow:0 0 10px #ff4fd8;
}

@keyframes fall{
  0%{transform:translateY(-10vh) scale(1); opacity:1;}
  100%{transform:translateY(110vh) scale(1.3); opacity:0;}
}

</style>
</head>

<body>

<div class="overlay"></div>

<!-- PAGE 1 -->
<div class="page active" id="p1">
  <button class="btn center" onclick="go(2)">click sini</button>
</div>

<!-- PAGE 2 -->
<div class="page" id="p2">
  <button class="btn top-right" onclick="go(3)">click lagii</button>
</div>

<!-- PAGE 3 -->
<div class="page" id="p3">
  <button class="btn top-left" onclick="go(4)">sabarrr dikit lagi🗿</button>
</div>

<!-- PAGE 4 -->
<div class="page" id="p4">
  <button class="btn bottom" onclick="go(5)">sinii ayyy</button>
</div>

<!-- PAGE 5 -->
<div class="page" id="p5">
  <button class="btn big-center" onclick="go(6)">nah ayok click</button>
</div>

<!-- PAGE 6 -->
<div class="page" id="p6">
  <div class="finalText">i loveee youuu 💐💖</div>
</div>

<script>

function go(n){
  document.querySelectorAll(".page").forEach(p=>{
    p.classList.remove("active");
  });

  document.getElementById("p"+n).classList.add("active");

  if(n === 6){
    startHearts();
  }
}

function startHearts(){
  setInterval(()=>{
    const h = document.createElement("div");
    h.classList.add("heart");
    h.innerHTML = "💖";

    h.style.left = Math.random()*100 + "vw";
    h.style.fontSize = (12 + Math.random()*20) + "px";
    h.style.animationDuration = (1.5 + Math.random()*3) + "s";

    document.body.appendChild(h);

    setTimeout(()=>h.remove(),5000);

  },80);
}

</script>

</body>
</html>
