<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">

  <title>WAKDIKZ SYSTEM</title>

  <style>

    body{
      margin:0;
      background:black;
      color:lime;
      font-family:monospace;
      overflow:hidden;
    }

    .bg{
      position:fixed;
      width:100%;
      height:100%;
      background:
      radial-gradient(circle at center, #001100 0%, black 70%);
      z-index:-1;
    }

    .container{
      text-align:center;
      margin-top:100px;
    }

    h1{
      font-size:55px;
      text-shadow:0 0 20px lime;
      animation:glow 1s infinite alternate;
    }

    @keyframes glow{
      from{
        text-shadow:0 0 10px lime;
      }

      to{
        text-shadow:0 0 30px lime;
      }
    }

    .box{
      width:80%;
      max-width:700px;
      margin:auto;
      margin-top:40px;
      border:2px solid lime;
      padding:20px;
      box-shadow:0 0 20px lime;
      background:rgba(0,0,0,0.7);
      text-align:left;
    }

    .line{
      margin:8px 0;
      animation:blink 0.7s infinite;
    }

    @keyframes blink{
      50%{
        opacity:0.5;
      }
    }

    button{
      margin-top:30px;
      padding:15px 40px;
      background:black;
      border:2px solid red;
      color:red;
      font-size:20px;
      cursor:pointer;
      box-shadow:0 0 20px red;
      transition:0.3s;
    }

    button:hover{
      background:red;
      color:black;
    }

    .footer{
      position:absolute;
      bottom:20px;
      width:100%;
      text-align:center;
      color:red;
      text-shadow:0 0 10px red;
    }

  </style>
</head>
